<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Học trực tuyến CNTT</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        .container {
            display: flex;
        }

        .menu {
            width: 200px;
            background: #eee;
        }

        .menu a {
            display: block;
            padding: 15px;
            text-decoration: none;
            color: black;
        }

        .menu a:hover {
            background: gray;
            color: white;
        }

        .content {
            padding: 20px;
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="menu">
            <a href="#">Trang chủ</a>
            <a href="#">Khóa học</a>
            <a href="#">Diễn đàn</a>
            <a href="#">Liên hệ</a>
        </div>

        <div class="content">
            <h1>Học trực tuyến Công nghệ thông tin</h1>

            <h3>Các khóa học:</h3>

            <ol>
                <li>Lập trình cơ bản</li>
                <li>Cấu trúc dữ liệu</li>
                <li>Thiết kế web</li>
            </ol>

        </div>

    </div>

</body>

</html>
